<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BP Media - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000; 
      color: #fff; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
    .box { 
      width: 90%; 
      max-width: 350px; 
      background: #000; 
      border: 1px solid #262626; 
      border-radius: 1px; 
      padding: 40px; 
      text-align: center; 
    }
    .logo { 
      font-size: 45px; 
      font-weight: 800; 
      margin-bottom: 30px; 
      font-family: 'Billabong', cursive; 
    }
    input { 
      width: 100%; 
      padding: 9px; 
      margin: 6px 0; 
      background: #121212; 
      border: 1px solid #262626; 
      border-radius: 3px; 
      color: #fff; 
      font-size: 12px; 
    }
    input:focus { outline: none; border-color: #8e8e8e; }
    button { 
      width: 100%; 
      padding: 7px; 
      margin-top: 12px; 
      background: #0095f6; 
      border: none; 
      border-radius: 8px; 
      color: #fff; 
      font-weight: 600; 
      font-size: 14px; 
      cursor: pointer; 
    }
    button:disabled { opacity: 0.3; }
    .troca { 
      margin-top: 20px; 
      font-size: 14px; 
      color: #8e8e8e; 
    }
    .troca span { color: #0095f6; font-weight: 600; cursor: pointer; }
    .erro { color: #ed4956; font-size: 12px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1 class="logo">bp</h1>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
    <button id="btn">Entrar</button>
    <p class="erro" id="erro"></p>
    <p class="troca">Não tem conta? <span id="link">Cadastre-se</span></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7KJ9AjbvvTxFT8HS3jQTWe2WnGnj8b9U",
      authDomain: "bpmedia-a2f8e.firebaseapp.com",
      projectId: "bpmedia-a2f8e",
      storageBucket: "bpmedia-a2f8e.firebasestorage.app",
      messagingSenderId: "126820217826",
      appId: "1:126820217826:web:7b6e5120cbc314c2f37fbb",
      measurementId: "G-M30RV4WHC7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById('email');
    const senha = document.getElementById('senha');
    const btn = document.getElementById('btn');
    const link = document.getElementById('link');
    const erro = document.getElementById('erro');
    const troca = document.querySelector('.troca');
    
    let modoLogin = true;
    let jaRedirecionou = false;

    // ANTI-LOOP: Só redireciona 1 vez quando confirmar que tá logado
    onAuthStateChanged(auth, (user) => {
      if (user && !jaRedirecionou) {
        jaRedirecionou = true;
        window.location.replace('/feed.html');
      }
    });

    link.onclick = () => {
      modoLogin = !modoLogin;
      btn.textContent = modoLogin ? 'Entrar' : 'Cadastrar';
      troca.innerHTML = modoLogin 
        ? 'Não tem conta? <span id="link">Cadastre-se</span>' 
        : 'Tem conta? <span id="link">Entre</span>';
      document.getElementById('link').onclick = link.onclick;
      erro.style.display = 'none';
    };

    btn.onclick = async () => {
      erro.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      
      try {
        if (modoLogin) {
          await signInWithEmailAndPassword(auth, email.value, senha.value);
        } else {
          await createUserWithEmailAndPassword(auth, email.value, senha.value);
        }
        // Não precisa redirecionar aqui, o onAuthStateChanged faz isso
      } catch (e) {
        erro.textContent = traduzErro(e.code);
        erro.style.display = 'block';
        btn.disabled = false;
        btn.textContent = modoLogin ? 'Entrar' : 'Cadastrar';
      }
    };

    function traduzErro(code) {
      if (code === 'auth/invalid-email') return 'Email inválido';
      if (code === 'auth/user-not-found') return 'Usuário não encontrado';
      if (code === 'auth/wrong-password') return 'Senha incorreta';
      if (code === 'auth/email-already-in-use') return 'Email já cadastrado';
      if (code === 'auth/weak-password') return 'Senha deve ter 6+ caracteres';
      return 'Erro ao fazer login';
    }
  </script>
</body>
</html>
