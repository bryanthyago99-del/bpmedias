<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BP Media</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000; 
      color: #fff; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    .box { width: 100%; max-width: 350px; text-align: center; }
    .logo { font-size: 45px; font-weight: 800; margin-bottom: 30px; }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 6px 0; 
      background: #121212; 
      border: 1px solid #262626; 
      border-radius: 8px; 
      color: #fff; 
      font-size: 14px; 
    }
    button { 
      width: 100%; 
      padding: 12px; 
      margin-top: 8px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 14px; 
      cursor: pointer; 
    }
    button:disabled { opacity: 0.4; }
    .btn-entrar { background: #fff; color: #000; }
    .btn-criar { background: #262626; color: #fff; margin-top: 12px; }
    .erro { color: #ed4956; font-size: 12px; margin-top: 15px; min-height: 15px; }
  </style>
</head>
<body>
  <div class="box">
    <h1 class="logo">bp</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-entrar" id="btnEntrar">Entrar</button>
    <button class="btn-criar" id="btnCriar">Criar conta</button>
    <p class="erro" id="erro"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7KJ9AjbvvTxFT8HS3jQTWe2WnGnj8b9U",
      authDomain: "bpmedia-a2f8e.firebaseapp.com",
      projectId: "bpmedia-a2f8e",
      storageBucket: "bpmedia-a2f8e.firebasestorage.app",
      messagingSenderId: "126820217826",
      appId: "1:126820217826:web:7b6e5120cbc314c2f37fbb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById('email');
    const senha = document.getElementById('senha');
    const btnEntrar = document.getElementById('btnEntrar');
    const btnCriar = document.getElementById('btnCriar');
    const erro = document.getElementById('erro');

    let jaRedirecionou = false;
    onAuthStateChanged(auth, (user) => {
      if (user && !jaRedirecionou) {
        jaRedirecionou = true;
        window.location.replace('/feed.html');
      }
    });

    btnEntrar.onclick = async () => {
      erro.textContent = '';
      btnEntrar.textContent = 'Entrando...';
      btnEntrar.disabled = true;
      try {
        await signInWithEmailAndPassword(auth, email.value, senha.value);
      } catch (e) {
        erro.textContent = traduzErro(e.code);
        btnEntrar.textContent = 'Entrar';
        btnEntrar.disabled = false;
      }
    };

    btnCriar.onclick = async () => {
      erro.textContent = '';
      btnCriar.textContent = 'Criando...';
      btnCriar.disabled = true;
      try {
        await createUserWithEmailAndPassword(auth, email.value, senha.value);
      } catch (e) {
        erro.textContent = traduzErro(e.code);
        btnCriar.textContent = 'Criar conta';
        btnCriar.disabled = false;
      }
    };

    function traduzErro(code) {
      if (code === 'auth/invalid-email') return 'Email inválido';
      if (code === 'auth/user-not-found') return 'Usuário não encontrado';
      if (code === 'auth/wrong-password') return 'Senha incorreta';
      if (code === 'auth/invalid-credential') return 'Email ou senha incorretos';
      if (code === 'auth/email-already-in-use') return 'Email já cadastrado';
      if (code === 'auth/weak-password') return 'Senha deve ter 6+ caracteres';
      return 'Erro. Tenta de novo';
    }
  </script>
</body>
</html>
