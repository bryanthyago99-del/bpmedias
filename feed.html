<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BP Media</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; }
    .top { position: fixed; top: 0; width: 100%; background: #000; border-bottom: 1px solid #262626; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .logo { font-size: 24px; font-weight: 800; }
    .icons { display: flex; gap: 20px; font-size: 24px; }
    .tabs { position: fixed; top: 57px; width: 100%; background: #000; border-bottom: 1px solid #262626; display: flex; z-index: 10; }
    .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; }
    .tab.active { border-bottom: 1px solid #fff; }
    .content { margin-top: 105px; padding: 20px; text-align: center; color: #8e8e8e; }
    .sair { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #262626; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">bp</div>
    <div class="icons">
      <span>⊕</span>
      <span>♡</span>
      <span>☰</span>
    </div>
  </div>
  
  <div class="tabs">
    <div class="tab active">Feed</div>
    <div class="tab">Reels</div>
    <div class="tab">Explorar</div>
  </div>

  <div class="content">
    <h2>Bem vindo ao BP Media</h2>
    <p style="margin-top:10px">Feed ainda vazio. Bora postar algo?</p>
  </div>

  <button class="sair" id="btnSair">Sair da conta</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7KJ9AjbvvTxFT8HS3jQTWe2WnGnj8b9U",
      authDomain: "bpmedia-a2f8e.firebaseapp.com",
      projectId: "bpmedia-a2f8e",
      storageBucket: "bpmedia-a2f8e.firebasestorage.app",
      messagingSenderId: "126820217826",
      appId: "1:126820217826:web:7b6e5120cbc314c2f37fbb",
      measurementId: "G-M30RV4WHC7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Se não tiver logado, volta pro login
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = '/';
    });

    document.getElementById('btnSair').onclick = async () => {
      await signOut(auth);
      window.location.href = '/';
    };
  </script>
</body>
</html>
