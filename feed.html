<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 20px auto; padding: 10px; background: #fafafa; }
   .post-box { background: white; padding: 15px; border: 1px solid #dbdbdb; margin-bottom: 20px; }
    input, textarea, button { width: 100%; margin: 5px 0; padding: 10px; box-sizing: border-box; }
    button { background: #0095f6; color: white; border: none; font-weight: bold; cursor: pointer; }
   .post { background: white; border: 1px solid #dbdbdb; margin: 20px 0; }
   .post img { width: 100%; }
   .post p { padding: 10px; margin: 0; }
  </style>
</head>
<body>

  <div class="post-box">
    <h3>Criar Post</h3>
    <input type="file" id="fileInput" accept="image/*">
    <textarea id="legenda" placeholder="Escreva uma legenda..." rows="3"></textarea>
    <button onclick="postarFoto()">Postar</button>
  </div>

  <div id="feed"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // COLA TUA CONFIG DO FIREBASE AQUI
    const firebaseConfig = {
      apiKey: "SUA_API_KEY_FIREBASE",
      authDomain: "SEU-PROJETO.firebaseapp.com",
      projectId: "SEU-PROJETO",
      storageBucket: "SEU-PROJETO.appspot.com",
      messagingSenderId: "123456",
      appId: "1:123456:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // API DO IMGBB - JÁ COLOQUEI TUA CHAVE
    const IMGBB_API_KEY = "30b0e6480c21675d4e20177822104a59";

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "index.html";
      else carregarPosts();
    });

    window.postarFoto = async () => {
      const file = document.querySelector('#fileInput').files[0];
      const legenda = document.querySelector('#legenda').value;
      const user = auth.currentUser;

      if (!file) return alert("Escolhe uma foto primeiro");
      if (!user) return alert("Você não tá logado");

      document.querySelector('button').innerText = "Postando...";

      try {
        // 1. Converte pra base64
        const base64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(file);
        });

        // 2. Manda pro ImgBB
        const form = new FormData();
        form.append('image', base64);
        const upload = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: 'POST',
          body: form
        });
        const data = await upload.json();
        const url = data.data.url;

        // 3. Salva no Firestore
        await addDoc(collection(db, "posts"), {
          imageUrl: url,
          caption: legenda,
          userId: user.uid,
          userEmail: user.email,
          createdAt: serverTimestamp()
        });

        document.querySelector('#fileInput').value = "";
        document.querySelector('#legenda').value = "";
        alert("Postado com sucesso!");
      } catch (e) {
        alert("Erro: " + e.message);
      }
      document.querySelector('button').innerText = "Postar";
    }

    function carregarPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snapshot) => {
        const feed = document.querySelector('#feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
          const post = doc.data();
          feed.innerHTML += `
            <div class="post">
              <p><b>${post.userEmail}</b></p>
              <img src="${post.imageUrl}">
              <p>${post.caption}</p>
            </div>
          `;
        });
      });
    }
  </script>
</body>
</html>
